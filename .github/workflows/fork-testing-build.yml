# Fork-only: ONE on-demand testing build that publishes ALL platforms into ONE release.
#
# A `meta` job creates a single dated prerelease, then the android / macOS / iOS jobs each attach
# their artifact to that SAME tag — so every release has NOOP-android + NOOP-android-debug (Android)
# + NOOP-macos.zip + NOOP-ios-unsigned.ipa together, each stamped with the base app version.
# Replaces the older split fork-testing-apk.yml + fork-testing-apple.yml.
# Unsigned/debug-keyed, no secrets. Trigger from the Actions tab. (Built from noop-staging via --ref.)
name: Testing build (fork)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: testing-build
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.m.outputs.tag }}
      ver: ${{ steps.m.outputs.ver }}
    steps:
      - uses: actions/checkout@v4
      - id: m
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="testing-latest"
          DATE=$(date -u +%Y-%m-%d)
          VER=$(grep -m1 'MARKETING_VERSION' project.yml | sed -E 's/.*"([^"]+)".*/\1/')
          SHA="${GITHUB_SHA:0:7}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          # ROLLING release: recreate the single tag so stale (incl. old-version) assets never linger —
          # one stable URL, always the newest build, zero cleanup. (To KEEP a build, cut a one-off tag.)
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes || true
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --prerelease --target "${{ github.sha }}" \
            --title "NOOP Staging — base ${VER} · ${DATE} · ${SHA}" \
            --notes "Rolling **latest** testing build — refreshed in place, so this tag is always the newest. NOOP main + ryanbr's open PRs + vetted community PRs, built with the **NOOP Staging** identity (installs **beside** the official app, separate data). Filenames carry the base app version (\`v${VER}\`).

          - **Android (release)** — \`NOOP-android-v${VER}.apk\` — optimized, non-debuggable build; installs beside the official app. \`com.noop.whoop.staging\`.
          - **Android (debug)** — \`NOOP-android-debug-v${VER}.apk\` — debuggable build. \`com.noop.whoop.debug\`.
          - **macOS** — \`NOOP-macos-v${VER}.zip\` — unzip, then **right-click → Open** (ad-hoc signed, not notarized; Gatekeeper warns once). If it says *\"damaged\"*, run \`xattr -dr com.apple.quarantine /Applications/NOOP.app\`.
          - **iOS** — \`NOOP-ios-unsigned-v${VER}.ipa\` — sideload via **AltStore / Sideloadly** (re-signs on-device); embedded watch app + widget extension stripped for free-account install reliability.

          Base app version ${VER} · built ${DATE} · \`${SHA}\`."

  android:
    needs: meta
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/wrapper-validation@v4
      - uses: gradle/actions/setup-gradle@v4
      # NOTE: both APKs are signed with the committed android/fork-debug.keystore via an explicit
      # storeFile in the debug signingConfig (build.gradle.kts, injected by rebuild-staging.sh) — the
      # release build falls back to the debug key when no keystore.properties is present. We do NOT
      # copy it to ~/.android/debug.keystore — the runner ignores that path (ANDROID_USER_HOME points off
      # $HOME) and would sign with a fresh random key, breaking sideloaded updates ("App not installed").
      # -PstagingRelease gives the release APK a .staging app id so it installs beside the official app.
      - name: Build debug + staging-release APKs
        run: ./gradlew assembleFullDebug assembleFullRelease -PstagingRelease
      - name: Version the filenames + attach
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ needs.meta.outputs.ver }}
        run: |
          cp app/build/outputs/apk/full/debug/*.apk "NOOP-android-debug-v${VER}.apk"
          cp app/build/outputs/apk/full/release/*.apk "NOOP-android-v${VER}.apk"
          gh release upload "${{ needs.meta.outputs.tag }}" \
            "NOOP-android-v${VER}.apk" "NOOP-android-debug-v${VER}.apk" \
            --repo "$GITHUB_REPOSITORY" --clobber

  macos:
    needs: meta
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build NOOP.app (macOS, unsigned, universal)
        # #51: force a true universal (x86_64 + arm64) build — 'platform=macOS' on an Apple-Silicon runner
        # thins to arm64-only. Mirrors the release workflow so testing builds match what ships.
        run: >-
          xcodebuild -scheme Strand -configuration Debug
          -destination 'generic/platform=macOS' ARCHS="x86_64 arm64" ONLY_ACTIVE_ARCH=NO
          -derivedDataPath build/dd
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
          build
      - name: Verify universal binary
        run: |
          APP=$(find build/dd/Build/Products -maxdepth 3 -name '*.app' -type d | head -1)
          EXE=$(find "$APP/Contents/MacOS" -maxdepth 1 -type f ! -name '*.dylib' | head -1)
          echo "archs: $(lipo -archs "$EXE")"
          { lipo -archs "$EXE" | grep -qw x86_64 && lipo -archs "$EXE" | grep -qw arm64; } \
            || { echo "::error::macOS binary is not universal (expected x86_64 + arm64)"; exit 1; }
      - name: Package + attach
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ needs.meta.outputs.ver }}
        run: |
          APP=$(find build/dd/Build/Products -maxdepth 3 -name '*.app' -type d | head -1)
          test -n "$APP" || { echo ".app not found"; exit 1; }
          # #429: ad-hoc sign the BUNDLE so it has a stable per-build code identity. macOS 26 (Tahoe) won't
          # bind a Bluetooth TCC grant to an UNSIGNED bundle, so users wedge at CBManagerState .unauthorized
          # even after a fresh `tccutil reset` + approve. `--sign -` gives a real cdhash-based designated
          # requirement TCC can grant to. No --entitlements / --options runtime: stays non-sandboxed so BT
          # goes through plain TCC + the Info.plist usage string. (cdhash still changes per build, so a
          # future UPDATE still needs the re-toggle the in-app #429/#295 banner already describes.)
          codesign --force --deep --sign - "$APP"
          codesign -dvv "$APP" 2>&1 | grep -Ei 'identifier|signature|flags' || true
          ditto -c -k --keepParent "$APP" "NOOP-macos-v${VER}.zip"
          gh release upload "${{ needs.meta.outputs.tag }}" "NOOP-macos-v${VER}.zip" --repo "$GITHUB_REPOSITORY" --clobber

  ios:
    needs: meta
    # iOS 26 Liquid Glass (glassEffect) needs the iOS 26 SDK → Xcode 26 → macos-26.
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build NOOPiOS for device (unsigned, Release)
        # #53: build RELEASE, not Debug. A Debug build carries get-task-allow + debug artifacts that make a
        # re-signed sideload fail "integrity could not be verified" on modern iOS; Release (the correct config
        # for a distributed app) installs clean — confirmed by the reporter's own Release build.
        run: >-
          xcodebuild -scheme NOOPiOS -configuration Release -destination 'generic/platform=iOS'
          -derivedDataPath build/dd
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
          build
      - name: Package unsigned .ipa (strip the embedded watch app + widget extension) + attach
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ needs.meta.outputs.ver }}
        run: |
          APP=$(find build/dd/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -type d | head -1)
          test -n "$APP" || { echo ".app (iphoneos) not found"; exit 1; }
          rm -rf "$APP/Watch"
          # Also drop the widget extension (NOOPWidgets.appex). On a re-signed sideload it forces a free
          # Apple ID to register a SECOND app id (com.noopapp.noop.widgets) plus the app group, and free
          # accounts get only 10 app ids / 7 days — so repeated AltStore attempts exhaust the quota and
          # return a generic "failed". The main app installs + runs fine without it (the home-screen widget
          # is the only thing lost), same rationale as the watch-app strip above.
          rm -rf "$APP/PlugIns"
          rm -rf Payload && mkdir Payload && cp -R "$APP" Payload/
          zip -qr "NOOP-ios-unsigned-v${VER}.ipa" Payload
          gh release upload "${{ needs.meta.outputs.tag }}" "NOOP-ios-unsigned-v${VER}.ipa" --repo "$GITHUB_REPOSITORY" --clobber

  # Fork-only housekeeping: the disposable `noop-staging` branch exists ONLY to feed this build. Once every
  # platform job has finished (pass OR fail — always()), delete it so GitHub's "Compare & pull request"
  # banner doesn't linger after each run. The rolling release tag (testing-latest) pins the built sha, so
  # deleting the branch orphans nothing. Guarded to the disposable branch name — a run dispatched from main
  # (or any other ref) is left alone.
  cleanup:
    needs: [meta, android, macos, ios]
    if: ${{ always() && github.ref_type == 'branch' && github.ref_name == 'noop-staging' }}
    runs-on: ubuntu-latest
    steps:
      - name: Delete the disposable staging branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/noop-staging" || true
